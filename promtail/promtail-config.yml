server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: flask_app
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: name
            values: ["assignment2-app-1", "app"]
    relabel_configs:
      - source_labels: [__meta_docker_container_name]
        target_label: container
      - source_labels: [__meta_docker_container_name]
        target_label: job
        replacement: flask_app
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            endpoint: endpoint
            status: status
      - labels:
          level:
          endpoint:
