name: CI/CD

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dev dependencies
        run: pip install -r app/requirements-dev.txt
      - name: Ruff
        run: ruff check app

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dev dependencies
        run: pip install -r app/requirements-dev.txt
      - name: Pytest
        run: cd app && python -m pytest -q

  security:
    name: Security scans
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Dependency scan (pip-audit)
        run: |
          pip install pip-audit==2.7.3
          pip-audit -r app/requirements.txt

      - name: Dockerfile lint (hadolint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: app/Dockerfile

      - name: Secrets scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"

      - name: Config / IaC scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          exit-code: "0"
          severity: HIGH,CRITICAL

  build:
    name: Build image
    runs-on: ubuntu-latest
    needs: [security]
    steps:
      - uses: actions/checkout@v4

      - name: Build application image
        run: docker build -t devops-final-app:${{ github.sha }} -t devops-final-app:latest ./app

      - name: Image vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: devops-final-app:latest
          exit-code: "0"
          severity: HIGH,CRITICAL

  deploy-verify:
    name: Deploy (local) + verify
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4

      - name: Create environment file
        run: |
          cp .env.example .env
          sed -i 's/^GF_SECURITY_ADMIN_PASSWORD=.*/GF_SECURITY_ADMIN_PASSWORD=ci-test-password/' .env

      - name: Deploy stack with docker compose
        run: docker compose up -d --build

      - name: Post-deploy verification
        run: ./scripts/verify.sh

      - name: Print logs on failure
        if: failure()
        run: docker compose logs

      - name: Tear down
        if: always()
        run: docker compose down -v
