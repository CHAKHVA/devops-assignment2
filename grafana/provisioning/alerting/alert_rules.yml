apiVersion: 1

groups:
  - orgId: 1
    name: Flask App Alerts
    folder: Alerts
    interval: 1m
    rules:
      - uid: high-error-rate
        title: HighErrorRate
        condition: C
        data:
          - refId: A
            queryType: ""
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: rate(app_errors_total[1m]) * 60
              refId: A
              instant: false
          - refId: C
            queryType: ""
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 5
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 0s
        labels:
          severity: critical
        annotations:
          summary: High error rate detected
          description: Application error rate has exceeded 5 errors per minute.

      - uid: high-request-latency
        title: HighRequestLatency
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: histogram_quantile(0.95, sum(rate(app_request_latency_seconds_bucket[5m])) by (le))
              refId: A
              instant: false
          - refId: C
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.5
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        noDataState: NoData
        execErrState: Error
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: High p95 request latency
          description: p95 request latency has exceeded 500ms for over 2 minutes.

      - uid: instance-down
        title: InstanceDown
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: prometheus
            model:
              expr: sum(up)
              refId: A
              instant: true
          - refId: C
            relativeTimeRange:
              from: 60
              to: 0
            datasourceUid: "__expr__"
            model:
              conditions:
                - evaluator:
                    params:
                      - 4
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    type: last
                  type: query
              refId: C
              type: classic_conditions
        noDataState: Alerting
        execErrState: Error
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: A scrape target is down
          description: One or more Prometheus scrape targets are unreachable.
